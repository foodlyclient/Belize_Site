<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cercle de fond -->
  <circle cx="50" cy="50" r="48" fill="url(#avatarGradient)" stroke="#ffcc00" stroke-width="2"/>

  <!-- Silhouette de tête -->
  <circle cx="50" cy="35" r="18" fill="#666666" stroke="#ffcc00" stroke-width="1"/>

  <!-- Corps -->
  <rect x="35" y="53" width="30" height="25" rx="5" fill="#666666" stroke="#ffcc00" stroke-width="1"/>

  <!-- Épaules -->
  <rect x="25" y="58" width="50" height="8" rx="4" fill="#666666" stroke="#ffcc00" stroke-width="1"/>

  <!-- Insigne militaire -->
  <polygon points="50,20 45,30 50,25 55,30" fill="#ffcc00"/>
  <rect x="47" y="25" width="6" height="8" fill="#ffcc00"/>
</svg>